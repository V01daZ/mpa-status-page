<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>MPA VPN Status</title>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: -apple-system, system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            text-align: center; 
            border: 1px solid #334155; 
            padding: 30px; 
            border-radius: 24px; 
            background: #1e293b; 
            width: 85%;
            max-width: 350px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }
        .brand { 
            font-size: 11px; 
            color: #94a3b8; 
            letter-spacing: 2px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        #status { 
            font-size: 44px;
            font-weight: 900; 
            margin: 20px 0; 
            letter-spacing: -1px;
        }
        .online { color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .offline { color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        .info { 
            color: #64748b; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">Mariittov Private Access</div>
        <div id="status">ЗАГРУЗКА...</div>
        <div class="info">Сервер: Финляндия 🇫🇮</div>
    </div>

    <script>
        async function checkStatus() {
            const url = "https://dominant-tortoise-117825.upstash.io/get/last_seen";
            const token = "ggAAAAAAAcxBAAIgcDEXUJ2U4G-fwQyMtgpBOfqlSdIMRbK9x7vrEadr0Rm8lg";
            
            try {
                const response = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
                const data = await response.json();
                const lastSeen = parseInt(data.result || 0);
                const now = Date.now();

                const statusEl = document.getElementById('status');
                
                if (now - lastSeen < 90000) {
                    statusEl.innerText = "● ONLINE";
                    statusEl.className = "online";
                } else {
                    statusEl.innerText = "● OFFLINE";
                    statusEl.className = "offline";
                }
            } catch (e) {
                document.getElementById('status').innerText = "ОШИБКА";
                document.getElementById('status').className = "offline";
            }
        }

        checkStatus();
        
        setInterval(checkStatus, 60000); 
    </script>
</body>
</html>
