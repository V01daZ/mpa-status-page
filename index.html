<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPA VPN Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: -apple-system, system-ui, sans-serif;
        }
        .wrap { width: 100%; max-width: 420px; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: #1d4ed8;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-text { color: white; font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
        .subtitle { color: #64748b; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1rem;
            transition: border-color 0.5s;
        }
        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .status-label { color: #94a3b8; font-size: 12px; margin-bottom: 4px; letter-spacing: 0.5px; }
        #status-text { font-size: 22px; font-weight: 500; color: #94a3b8; transition: color 0.5s; }
        .dot-wrap {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #334155;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.5s, border 0.5s;
        }
        .dot { width: 16px; height: 16px; border-radius: 50%; background: #64748b; transition: background 0.5s; }
        .divider { border-top: 1px solid #334155; padding-top: 1.25rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .meta-label { color: #64748b; font-size: 11px; margin-bottom: 4px; letter-spacing: 0.5px; }
        .meta-value { color: #e2e8f0; font-size: 14px; font-weight: 500; }
        .card-sm { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
        #history-bar { display: flex; gap: 3px; align-items: flex-end; height: 32px; margin-top: 10px; }
        #footer-text { color: #334155; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
<div class="wrap">

    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <span class="logo-text">MPA VPN</span>
        </div>
        <p class="subtitle">System Status</p>
    </div>

    <div class="card" id="main-card">
        <div class="card-top">
            <div>
                <p class="status-label">Finland — Helsinki</p>
                <p id="status-text">Checking...</p>
            </div>
            <div class="dot-wrap" id="dot-wrap">
                <div class="dot" id="dot"></div>
            </div>
        </div>
        <div class="divider">
            <div>
                <p class="meta-label">PROTOCOL</p>
                <p class="meta-value">VLESS Reality</p>
            </div>
            <div>
                <p class="meta-label">PORT</p>
                <p class="meta-value">443 / HTTPS</p>
            </div>
            <div>
                <p class="meta-label">LAST CHECK</p>
                <p class="meta-value" id="last-check">—</p>
            </div>
            <div>
                <p class="meta-label">UPTIME</p>
                <p class="meta-value" id="uptime-text">—</p>
            </div>
        </div>
    </div>

    <div class="card-sm">
        <p class="meta-label">HISTORY (30 CHECKS)</p>
        <div id="history-bar"></div>
    </div>

    <p id="footer-text">Refreshes every 60 seconds</p>

</div>

<script>
const UPSTASH_URL = "https://dominant-tortoise-117825.upstash.io/get/last_seen";
const UPSTASH_TOKEN = "ggAAAAAAAcxBAAIgcDEXUJ2U4G-fwQyMtgpBOfqlSdIMRbK9x7vrEadr0Rm8lg";

let checks = [];

async function checkStatus() {
    try {
        const r = await fetch(UPSTASH_URL, {
            headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` }
        });
        const data = await r.json();
        const lastSeen = parseInt(data.result || 0);
        const now = Date.now();
        const diff = now - lastSeen;
        const online = diff < 90000;

        checks.push(online);
        if (checks.length > 30) checks.shift();

        const statusText = document.getElementById('status-text');
        const dotWrap = document.getElementById('dot-wrap');
        const dot = document.getElementById('dot');
        const mainCard = document.getElementById('main-card');
        const lastCheck = document.getElementById('last-check');
        const uptimeText = document.getElementById('uptime-text');

        if (online) {
            statusText.textContent = 'Operational';
            statusText.style.color = '#10b981';
            dotWrap.style.background = 'rgba(16,185,129,0.15)';
            dotWrap.style.border = '1px solid rgba(16,185,129,0.3)';
            dot.style.background = '#10b981';
            mainCard.style.borderColor = 'rgba(16,185,129,0.2)';
        } else {
            statusText.textContent = 'Degraded';
            statusText.style.color = '#ef4444';
            dotWrap.style.background = 'rgba(239,68,68,0.15)';
            dotWrap.style.border = '1px solid rgba(239,68,68,0.3)';
            dot.style.background = '#ef4444';
            mainCard.style.borderColor = 'rgba(239,68,68,0.2)';
        }

        const secs = Math.round(diff / 1000);
        lastCheck.textContent = secs < 60 ? `${secs}s ago` : `${Math.round(secs / 60)}m ago`;

        const upPct = checks.length
            ? Math.round(checks.filter(Boolean).length / checks.length * 100)
            : 100;
        uptimeText.textContent = `${upPct}%`;

        renderHistory();
        document.getElementById('footer-text').textContent =
            'Last refreshed: ' + new Date().toLocaleTimeString();

    } catch (e) {
        document.getElementById('status-text').textContent = 'Unknown';
    }
}

function renderHistory() {
    const bar = document.getElementById('history-bar');
    bar.innerHTML = '';
    for (let i = 0; i < 30; i++) {
        const idx = checks.length - 30 + i;
        let color = '#334155';
        let opacity = 0.3;
        let height = '40%';
        if (idx >= 0 && idx < checks.length) {
            color = checks[idx] ? '#10b981' : '#ef4444';
            opacity = 1;
            height = '100%';
        }
        const d = document.createElement('div');
        d.style.cssText = `flex:1;background:${color};border-radius:3px;height:${height};opacity:${opacity};`;
        bar.appendChild(d);
    }
}

renderHistory();
checkStatus();
setInterval(checkStatus, 60000);
</script>
</body>
</html>
